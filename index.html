<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Event</title>
  <link rel="stylesheet" href="convite/assets/css/style.css">
</head>

<body>

  <canvas id="starfield"></canvas>

  <div class="wrapper">

    <div class="convite-box fechado" id="box">

      <button id="btn-pular" class="btn-pular hidden" onclick="pularTexto()" title="Pular texto">
        &#11166;&#11166;
      </button>

      <p class="titulo ouro-brilhante" id="titulo-principal">
        <span class="estrela-girando">✨</span>
        <span class="texto-titulo">Interactive-Event v2.0</span>
        <span class="estrela-girando">✨</span>
      </p>

      <div class="setinha" id="setinha-v">
        <span>&#11167;</span>
      </div>

      <div id="texto"></div>

      <div id="acao" class="hidden">
        <div class="bloco-input">
          <input type="text" id="nome" placeholder="Nome e sobrenome" autocapitalize="words">
          <button onclick="confirmar()">Registrar marca</button>
        </div>
      </div>

    </div>

    <div class="convite-box hidden" id="box-agradecimento">
        <div class="conteudo-agradecimento">

        <p class="ouro-brilhante texto-final-centralizado" id="nome-agradecimento"></p>
          <p>Obrigado, <span id="nome-confirmado"></span>!<br>
          Sua marca está no BDD! 🎉
        </p>

        <button id="btn-ver-lista" class="btn-lista">
            Veja quem já passou por aqui
        </button>

      </div>
    </div>
  </div>

  <div id="modal-lista" class="hidden overlay-lista">
    <div class="convite-box aberto">
      <p class="titulo ouro-brilhante">
        <span class="estrela-girando">✨</span>
        QUEM JÁ PASSOU AQUI
        (<span id="contador-total">...</span>)
        <span class="estrela-girando">✨</span>
      </p>

      <p id="obs-ordem" class="legenda-ordem"></p>

      <div id="lista-nomes" class="container-nomes">
        <p style="color: #fff; text-align: center;">Carregando lista...</p>
      </div>

      <button onclick="voltarAoInicio()" class="btn-pequeno">Fechar</button>
    </div>
  </div>

  <audio id="typingSound" src="convite/assets/audio/typing.mp3" preload="auto"></audio>
  <audio id="musicaFundo" src="convite/assets/audio/stars.mp3" preload="auto" loop></audio>

  <script src="convite/assets/js/stars.js"></script>
  <script src="convite/assets/js/script.js"></script>

</body>

</html>
