<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Especial</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="convite/style.css">
</head>

<body>

  <canvas id="starfield"></canvas>

  <div class="wrapper">

    <div class="convite-box fechado" id="box">

      <button id="btn-pular" class="btn-pular hidden" onclick="pularTexto()" title="Pular texto">
        &#11166;&#11166;
      </button>

      <p class="titulo ouro-brilhante" id="titulo-principal">
        <span class="estrela-girando">✨</span>
        <span class="texto-titulo">VOCÊ ESTÁ CONVIDADO</span>
        <span class="estrela-girando">✨</span>
      </p>

      <div class="setinha" id="setinha-v">
        <span>&#11167;</span>
      </div>

      <div id="texto"></div>

      <div id="final-frase" class="final hidden">
        <p class="ouro-brilhante">DE PERTO <span>OU DE CORAÇÃO</span></p>
      </div>

      <div id="acao" class="hidden">
        <div class="bloco-input">
          <input type="text" id="nome" placeholder="Nome e sobrenome" autocapitalize="words">
          <button onclick="confirmar()">Confirmar Presença</button>
        </div>
      </div>

    </div>

    <div class="convite-box fechado" id="box-lista-inicial" onclick="abrirListaConfirmados()">
      <p class="titulo ouro-brilhante" style="font-size: 18px;">
        👥 VER QUEM JÁ CONFIRMOU
      </p>
    </div>

    <div class="convite-box fechado hidden" id="box-agradecimento">
      <div class="conteudo-agradecimento">

        <p class="ouro-brilhante texto-final-centralizado">
          Obrigado, <span id="nome-confirmado"></span>!<br>
          Sua presença foi confirmada 🎉
        </p>

        <div class="pergunta-novo" id="pergunta-bloco">
          <span>Quer confirmar mais alguém?</span>
          <div class="botoes-lado-a-lado">
            <button onclick="mostrarNovoInput()" class="btn-pequeno">Sim</button>
            <button onclick="voltarAoInicio()" class="btn-pequeno btn-escuro">Não</button>
          </div>
        </div>

        <div id="novo-registro" class="hidden bloco-input-interno">
          <input type="text" id="nome-novo" placeholder="Nome e sobrenome da outra pessoa" autocapitalize="words">
          <button onclick="confirmarNovo()">Confirmar Presença</button>
        </div>
      </div>

    </div>

  </div>

  <div id="modal-lista" class="hidden overlay-lista">
    <div class="convite-box aberto">
      <p class="titulo ouro-brilhante">
        <span class="estrela-girando">✨</span>
        QUEM JÁ CONFIRMOU
        (<span id="contador-total">...</span>)
        <span class="estrela-girando">✨</span>
      </p>

      <p id="obs-ordem" class="legenda-ordem"></p>

      <div id="lista-nomes" class="container-nomes">
        <p style="color: #fff; text-align: center;">Carregando lista...</p>
      </div>

      <button onclick="fecharListaConfirmados()" class="btn-pequeno">Fechar</button>
    </div>
  </div>

  <audio id="typingSound" src="convite/typing.mp3" preload="auto"></audio>
  <audio id="musicaFundo" src="convite/stars.mp3" preload="auto" loop></audio>

  <script src="convite/stars.js"></script>
  <script src="convite/script.js"></script>

</body>

</html>
